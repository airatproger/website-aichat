<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/tokens/colors.css">
  <link rel="stylesheet" href="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/tokens/typography.css">
  <link rel="stylesheet" href="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/tokens/effects.css">
  <link rel="stylesheet" href="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/styles.css">
  <script src="_ds/airatiik-ai-chat-design-system-b8300c77-9bc9-42a9-ba05-3ece811038ce/_ds_bundle.js"></script>
</helmet>
<div style="position:relative; width:100%; height:100%; box-sizing:border-box; display:flex; flex-direction:column; background:var(--surface-base, #fff); border-radius:16px; box-shadow:var(--ring-subtle, 0 0 0 1px rgba(0,0,0,0.07)), 0 40px 90px rgba(20,28,48,0.22); overflow:hidden; font-family:var(--font-sans, system-ui, sans-serif); border:none; outline:none;">

  <!-- top chrome: traffic lights + tab + omnibox -->
  <div style="flex:none; display:flex; flex-direction:column; background:#f3f3f1; border-bottom:1px solid var(--border-subtle, rgba(0,0,0,0.08));">
    <!-- tab strip -->
    <div style="display:flex; align-items:flex-end; gap:8px; padding:9px 14px 0;">
      <div style="display:flex; align-items:center; gap:7px; margin-right:6px; padding-bottom:8px;">
        <span style="width:11px; height:11px; border-radius:50%; background:#ec6a5e;"></span>
        <span style="width:11px; height:11px; border-radius:50%; background:#f4bf4f;"></span>
        <span style="width:11px; height:11px; border-radius:50%; background:#61c554;"></span>
      </div>
      <div style="display:flex; align-items:center; gap:8px; padding:8px 12px; min-width:170px; max-width:230px; background:var(--surface-base); border-radius:10px 10px 0 0; box-shadow:0 -1px 0 var(--border-subtle), -1px 0 0 var(--border-subtle), 1px 0 0 var(--border-subtle);">
        <span style="width:14px; height:14px; border-radius:4px; background:#dcdcda; flex:none;"></span>
        <span style="font-size:12.5px; font-weight:500; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">The shift to in-browser AI</span>
        <span style="margin-left:auto; display:inline-flex; color:var(--text-tertiary); flex:none;"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg></span>
      </div>
      <span style="display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; margin-bottom:8px; border-radius:7px; color:var(--text-tertiary);"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg></span>
    </div>
    <!-- toolbar -->
    <div style="display:flex; align-items:center; gap:10px; padding:9px 14px; background:var(--surface-base);">
      <div style="display:flex; align-items:center; gap:6px; color:#9a9a98;">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" style="opacity:0.45"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 11a8 8 0 1 0-.5 4M20 5v4h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div style="flex:1; display:flex; align-items:center; gap:9px; padding:7px 14px; background:#f1f1ef; border-radius:var(--radius-pill); min-width:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" style="color:#7d8a7d; flex:none;"><path d="M6 11V8a6 6 0 0 1 12 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><rect x="4.5" y="11" width="15" height="9.5" rx="2.5" fill="currentColor" opacity="0.85"></rect></svg>
        <span style="font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">theverge.com/ai-artificial-intelligence</span>
      </div>
      <!-- pinned extension: AI Chat -->
      <div style="display:flex; align-items:center; gap:4px; flex:none;">
        <span style="display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px; background:rgba(37,115,233,0.12); box-shadow:inset 0 0 0 1px rgba(37,115,233,0.25);"><img src="assets/aichatlogo.png" alt="AI Chat" style="width:20px; height:20px; display:block;"></span>
      </div>
    </div>
  </div>

  <!-- viewport: webpage + docked side panel -->
  <div style="flex:1; min-height:0; display:flex; background:var(--surface-base);">

    <!-- faux webpage -->
    <div style="flex:1; min-width:0; padding:26px 30px; display:flex; flex-direction:column; gap:18px; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:10px;"><span style="width:22px; height:22px; border-radius:6px; background:#cdcdcb;"></span><span style="width:64px; height:9px; border-radius:5px; background:#cfcfcd;"></span></div>
        <div style="display:flex; gap:14px;"><span style="width:34px; height:8px; border-radius:5px; background:#e3e3e1;"></span><span style="width:34px; height:8px; border-radius:5px; background:#e3e3e1;"></span><span style="width:34px; height:8px; border-radius:5px; background:#e3e3e1;"></span></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:11px; margin-top:8px;">
        <span style="width:48px; height:9px; border-radius:5px; background:var(--accent); opacity:0.5;"></span>
        <span style="width:92%; height:20px; border-radius:7px; background:#bdbdbb;"></span>
        <span style="width:70%; height:20px; border-radius:7px; background:#bdbdbb;"></span>
      </div>
      <div style="display:flex; align-items:center; gap:9px; margin-top:2px;"><span style="width:26px; height:26px; border-radius:50%; background:#dcdcda;"></span><span style="width:120px; height:8px; border-radius:5px; background:#dcdcda;"></span></div>
      <div style="height:128px; border-radius:14px; background:linear-gradient(135deg,#ededeb,#dedede); box-shadow:var(--ring-subtle); margin-top:4px;"></div>
      <div style="display:flex; flex-direction:column; gap:9px; margin-top:4px;">
        <span style="width:100%; height:8px; border-radius:5px; background:#e6e6e4;"></span>
        <span style="width:97%; height:8px; border-radius:5px; background:#e6e6e4;"></span>
        <span style="width:99%; height:8px; border-radius:5px; background:#e6e6e4;"></span>
        <span style="width:62%; height:8px; border-radius:5px; background:#e6e6e4;"></span>
      </div>
    </div>

    <!-- docked side panel — scaled down so the UI reads at a natural size -->
    <div style="flex:none; width:50%; max-width:392px; min-width:262px; padding:14px 14px 14px 4px; box-sizing:border-box; background:var(--surface-base);">
      <div style="position:relative; width:100%; height:100%;">
        <div style="position:absolute; top:0; left:0; width:142.86%; height:142.86%; transform:scale(0.7); transform-origin:top left;">
          <dc-import name="ChatPanel" hint-size="100%,100%" style="width:100%; height:100%;"></dc-import>
        </div>
      </div>
    </div>

  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:600}}"></script>
</body>
</html>
